<!DOCTYPE html>
<html lang="mr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>GP Sakhi — ग्रामपंचायत सखी</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Noto Sans Devanagari',sans-serif;
background:linear-gradient(135deg,#fff7e6,#f3fff4);
min-height:100vh;
color:#222;
overflow-x:hidden;
}

/* ================= NAVBAR ================= */

nav{
height:70px;
background:linear-gradient(90deg,#ff9933,#ffffff,#138808);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
position:fixed;
top:0;
width:100%;
z-index:100;
}

.logo{
font-size:22px;
font-weight:700;
}

.logo span{
color:#e65100;
}

.nav-btn{
background:#1565c0;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

.nav-btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* ================= HERO ================= */

.hero{
padding-top:130px;
text-align:center;
padding-bottom:90px;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.8;
margin-bottom:30px;
}

.cta-btn{
background:linear-gradient(90deg,#ff9933,#ff6f00);
color:white;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.cta-btn:hover{
transform:scale(1.05);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* ================= FEATURES ================= */

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:60px;
}

.card{
background:white;
border-radius:16px;
padding:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h3{
margin-top:10px;
margin-bottom:10px;
}

.card p{
opacity:0.8;
}

/* ================= LOADING ================= */

.loading-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1a2744;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:200;
transition:0.5s;
}

.loading-screen.hide{
opacity:0;
pointer-events:none;
}

.loader{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* ================= MODAL ================= */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.modal.show{
opacity:1;
pointer-events:auto;
}

.modal-box{
background:white;
padding:40px;
border-radius:12px;
text-align:center;
width:320px;
}

.google-btn{
background:white;
border:1px solid #ddd;
padding:12px;
width:100%;
cursor:pointer;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

</style>
</head>

<body>

<!-- Loading Screen -->

<div class="loading-screen" id="loadingScreen">
<div class="loader"></div>
<div>GP Sakhi Loading...</div>
</div>

<!-- NAVBAR -->

<nav>

<div class="logo">
🏛 GP <span>Sakhi</span>
</div>

<button class="nav-btn" id="navLoginBtn" onclick="showLoginModal()">
Login
</button>

</nav>

<!-- HERO -->

<section class="hero">

<h1>डिजिटल ग्रामपंचायत व्यवस्थापन</h1>

<p>
ग्रामपंचायतचे काम सोपे, जलद आणि डिजिटल पद्धतीने करा
</p>

<button class="cta-btn" onclick="showLoginModal()">
सुरू करा
</button>

</section>

<!-- FEATURES -->

<section class="features">

<div class="card reveal">
<h3>💰 Voucher Generator</h3>
<p>मजुरी वाउचर सहज तयार करा</p>
</div>

<div class="card reveal">
<h3>📊 ग्रामपंचायत Tools</h3>
<p>ग्रामपंचायत कामांसाठी डिजिटल टूल्स</p>
</div>

<div class="card reveal">
<h3>🧾 Reports</h3>
<p>कामाचे रिपोर्ट्स तयार करा</p>
</div>

</section>

<!-- LOGIN MODAL -->

<div class="modal" id="loginModal">

<div class="modal-box">

<h3>Login</h3>

<br>

<button class="google-btn" id="modalGoogleBtn" onclick="handleGoogleLogin()">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">

Google ने Continue करा

</button>

</div>

</div>

<script>

function showLoginModal(){
document.getElementById('loginModal').classList.add('show');
}

function closeLoginModal(){
document.getElementById('loginModal').classList.remove('show');
}

document.getElementById('loginModal').onclick=function(e){
if(e.target===this)closeLoginModal();
}

</script>

</body>
</html>
