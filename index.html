<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>दवंडी जनरेटर — GP Sakhi</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Marathi&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --saffron:#F58220; --navy:#1A2744; --cream:#FDFBF7; --sand:#EAE3D5; --text:#2C3E50; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans Devanagari',sans-serif;background:linear-gradient(145deg,var(--cream) 0%,#f0ebd8 100%);color:var(--text);min-height:100vh;}
nav{background:rgba(255,255,255,0.88);backdrop-filter:blur(15px);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.06);border-bottom:1px solid rgba(255,255,255,0.6);}
nav::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#FF9933 33%,#FFFFFF 33%,#FFFFFF 66%,#138808 66%);}
.page{max-width:1200px;margin:0 auto;padding:24px 18px 80px;}
.page-hero{background:linear-gradient(135deg,var(--navy),#1e3a5f);border-radius:16px;padding:22px 28px;margin-bottom:22px;color:white;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:860px){.two-col{grid-template-columns:1fr;}}
.card{background:white;border-radius:14px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1px solid rgba(224,213,192,0.5);}
.card-head{background:linear-gradient(135deg,var(--navy),#2a3f6e);padding:11px 18px;color:white;font-weight:bold;}
.card-body{padding:18px;}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fld label{font-size:8pt;font-weight:700;color:#6B7280;text-transform:uppercase;}
.fld input, .fld textarea{padding:10px; border:1.5px solid var(--sand); border-radius:8px; background:#fafaf7;}
.preview-box{background:white;border-radius:12px;border:1px solid var(--sand);padding:20px;min-height:400px;}
.dav-preview{font-size:13px;line-height:1.7;color:#000;}
.dav-hdr{text-align:center;border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:16px;}
.dav-heading{text-align:center;font-size:22px;font-weight:800;margin:18px 0;}
.btn-generate, .btn-audio, .btn-print{display:block;width:100%;color:white;border:none;border-radius:12px;padding:14px;font-size:12pt;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:center;text-decoration:none;}
.btn-generate{background:var(--navy);}
.btn-audio{background:#7c3aed;}
.btn-print{background:var(--saffron);}
#actionSection{display:none;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;}
.modal{background:white;width:90%;max-width:400px;border-radius:20px;padding:25px;text-align:center;}
.modal h3{margin-bottom:15px;color:var(--navy);}
#voiceSelect{width:100%;padding:10px;margin-bottom:15px;border-radius:8px;}
</style>
</head>
<body>

<nav><div class="nav-logo"><span>GP Sakhi</span></div></nav>

<div class="page">
  <div class="page-hero">
    <h1>दवंडी जनरेटर</h1>
    <p>डॉक्युमेंट आणि ऑडिओ तयार करा</p>
  </div>

  <div class="two-col">
    <div>
      <div class="card">
        <div class="card-head">ग्रामपंचायत माहिती</div>
        <div class="card-body">
          <div class="fld"><label>GP नाव</label><input type="text" id="gpn" oninput="rp()"></div>
          <div class="fld"><label>सरपंच</label><input type="text" id="sarp" oninput="rp()"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">दवंडीचा मजकूर</div>
        <div class="card-body">
          <div class="fld">
            <label>मजकूर</label>
            <textarea id="davText" rows="6" oninput="rp()"></textarea>
          </div>
        </div>
      </div>
      <button class="btn-generate" onclick="document.getElementById('actionSection').style.display='block'">📢 दवंडी तयार करा</button>
      <div id="actionSection">
        <button class="btn-print" onclick="window.print()">🖨️ प्रिंट / PDF</button>
        <button class="btn-audio" onclick="openAudioModal()">🔊 ऑडिओ ऐका</button>
      </div>
    </div>
    <div class="preview-box" id="davPreview">मजकूर भरल्यावर येथे दिसेल...</div>
  </div>
</div>

<!-- Audio Modal -->
<div class="overlay" id="audioOverlay">
  <div class="modal">
    <h3>🔊 ऑडिओ दवंडी</h3>
    <p style="font-size: 9pt; margin-bottom: 10px;">तुमच्या फोनमधील मराठी आवाज निवडा:</p>
    <select id="voiceSelect"></select>
    <button class="btn-generate" id="playBtn" onclick="speakText()">ऐका</button>
    <button class="btn-audio" style="background:#666;" onclick="stopSpeech()">थांबवा</button>
    <button onclick="closeAudioModal()" style="margin-top:15px; border:none; background:none; color:red; cursor:pointer;">बंद करा</button>
    <p style="font-size: 8pt; color: #888; margin-top: 15px;">टीप: डाउनलोड करण्यासाठी 'Screen Recorder' किंवा 'Audio Recorder' चा वापर करा, कारण ब्राउझर थेट फाईल सेव्ह करू देत नाही.</p>
  </div>
</div>

<script>
function rp(){
  const gpn = document.getElementById('gpn').value || '_____';
  const text = document.getElementById('davText').value || '...';
  const sarp = document.getElementById('sarp').value || 'सरपंच';
  document.getElementById('davPreview').innerHTML = `
    <div class="dav-preview">
      <div class="dav-hdr"><h1>ग्रामपंचायत कार्यालय ${gpn}</h1></div>
      <div class="dav-heading">॥ दवंडी ॥</div>
      <p>${text.replace(/\n/g, '<br>')}</p>
      <div style="margin-top:30px; text-align:right;"><strong>${sarp}</strong><br>सरपंच, ग्रा.पं. ${gpn}</div>
    </div>`;
}

// Web Speech API Logic
let synth = window.speechSynthesis;
let voices = [];

function loadVoices() {
  voices = synth.getVoices();
  const voiceSelect = document.getElementById('voiceSelect');
  voiceSelect.innerHTML = '';
  
  // फक्त मराठी आणि हिंदी आवाज फिल्टर करणे
  voices.forEach((voice) => {
    if(voice.lang.includes('mr') || voice.lang.includes('hi')) {
      const option = document.createElement('option');
      option.textContent = `${voice.name} (${voice.lang})`;
      option.value = voice.name;
      voiceSelect.appendChild(option);
    }
  });

  if(voiceSelect.options.length === 0) {
    const option = document.createElement('option');
    option.textContent = "मराठी आवाज सापडला नाही";
    voiceSelect.appendChild(option);
  }
}

loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

function openAudioModal(){
  document.getElementById('audioOverlay').style.display = 'flex';
  loadVoices();
}

function closeAudioModal(){
  document.getElementById('audioOverlay').style.display = 'none';
  stopSpeech();
}

function speakText() {
  if (synth.speaking) { synth.cancel(); }
  const text = document.getElementById('davText').value;
  if (text !== '') {
    const utterThis = new SpeechSynthesisUtterance(text);
    const selectedVoice = document.getElementById('voiceSelect').value;
    voices.forEach((voice) => {
      if (voice.name === selectedVoice) { utterThis.voice = voice; }
    });
    utterThis.pitch = 1;
    utterThis.rate = 0.9; // थोडा संथ आवाज दवंडीसाठी चांगला वाटतो
    synth.speak(utterThis);
  }
}

function stopSpeech() { synth.cancel(); }
</script>
</body>
</html>
