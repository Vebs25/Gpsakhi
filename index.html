<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>दवंडी जनरेटर — GP Sakhi</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Noto Sans Devanagari',sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}
.container{
  max-width:800px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
h1{
  text-align:center;
}
textarea{
  width:100%;
  min-height:150px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
.generate{
  background:#1A2744;
  color:white;
}
.audio{
  background:#7c3aed;
  color:white;
}
.preview{
  margin-top:20px;
  padding:15px;
  border:1px solid #ddd;
  border-radius:10px;
  min-height:100px;
}
</style>
</head>

<body>

<div class="container">

<h1>📢 दवंडी जनरेटर</h1>

<textarea id="davText" placeholder="दवंडीचा मजकूर लिहा..."></textarea>

<button class="generate" onclick="previewText()">📄 Preview</button>
<button class="audio" onclick="generateAudioMP3()">🔊 MP3 डाउनलोड करा</button>

<div class="preview" id="previewBox">
Preview येथे दिसेल...
</div>

</div>

<script>

const FUNCTION_URL = "PASTE_YOUR_FIREBASE_FUNCTION_URL_HERE";

function previewText(){
  const text = document.getElementById("davText").value;
  document.getElementById("previewBox").innerText = text;
}

async function generateAudioMP3(){

  const text = document.getElementById("davText").value.trim();

  if(!text){
    alert("कृपया मजकूर भरा");
    return;
  }

  const btn = document.querySelector(".audio");
  btn.innerHTML = "⏳ तयार होत आहे...";
  btn.disabled = true;

  try{

    const response = await fetch(FUNCTION_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({text})
    });

    const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "davandi.mp3";
    document.body.appendChild(a);
    a.click();
    a.remove();

    window.URL.revokeObjectURL(url);

  }catch(e){
    alert("Error आला");
    console.error(e);
  }

  btn.innerHTML = "🔊 MP3 डाउनलोड करा";
  btn.disabled = false;
}

</script>

</body>
</html>
